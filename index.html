<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Visione AI - Avanzata</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <!-- Markdown e highlight.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
        :root {
            --bg-color: #f5f5f7; --text-main: #1d1d1f; --text-muted: #86868b;
            --sidebar-bg: rgba(240,240,245,0.6); --glass-bg: rgba(255,255,255,0.4);
            --glass-border: rgba(0,0,0,0.08); --glass-shadow: 0 8px 32px 0 rgba(0,0,0,0.05);
            --accent-color: #0071e3; --msg-user: rgba(0,113,227,0.1);
            --msg-ai: rgba(255,255,255,0.6); --input-bg: rgba(255,255,255,0.7);
            --hover-item: rgba(0,0,0,0.04);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #060608; --text-main: #f5f5f7; --text-muted: #86868b;
                --sidebar-bg: rgba(20,20,25,0.6); --glass-bg: rgba(255,255,255,0.02);
                --glass-border: rgba(255,255,255,0.08); --glass-shadow: 0 8px 32px 0 rgba(0,0,0,0.5);
                --accent-color: #2997ff; --msg-user: rgba(41,151,255,0.15);
                --msg-ai: rgba(255,255,255,0.03); --input-bg: rgba(30,30,35,0.6);
                --hover-item: rgba(255,255,255,0.05);
            }
        }
        body { background-color: var(--bg-color); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(40px); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow); }
        #sidebar { width: 300px; height: 100%; border-right: 1px solid var(--glass-border); background: var(--sidebar-bg); display: flex; flex-direction: column; padding: 24px 16px; z-index: 10; }
        .brand h2 { font-size: 1.3rem; margin-bottom: 24px; display: flex; align-items: center; gap: 8px; }
        .btn-glass { background: var(--input-bg); border: 1px solid var(--glass-border); color: var(--text-main); padding: 12px 16px; border-radius: 14px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 500; }
        .btn-glass:hover { background: var(--hover-item); transform: translateY(-1px); }
        .chat-list-container { flex: 1; overflow-y: auto; margin-top: 24px; display: flex; flex-direction: column; gap: 8px; }
        .chat-list-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .chat-list-item:hover { background: var(--hover-item); }
        .chat-list-item.active { background: var(--input-bg); border-color: var(--glass-border); }
        .delete-chat-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; opacity: 0; padding: 2px 6px; border-radius: 6px; }
        .chat-list-item:hover .delete-chat-btn { opacity: 1; }
        #main-chat { flex: 1; display: flex; flex-direction: column; position: relative; height: 100%; }
        #chat-display { flex: 1; overflow-y: auto; padding: 40px 18% 160px 18%; display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth; opacity: 0; pointer-events: none; transition: 0.4s; }
        #chat-display.active { opacity: 1; pointer-events: all; }
        .message-wrapper { display: flex; width: 100%; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .message { max-width: 85%; padding: 16px 20px; border-radius: 20px; line-height: 1.5; position: relative; box-shadow: var(--glass-shadow); }
        .user-wrapper { justify-content: flex-end; }
        .msg-user { background: var(--msg-user); border: 1px solid var(--msg-user-border); border-bottom-right-radius: 4px; }
        .ai-wrapper { justify-content: flex-start; }
        .msg-ai { background: var(--msg-ai); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; }
        .copy-btn, .download-btn { position: absolute; top: -12px; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transition: 0.2s; font-size: 0.85rem; }
        .copy-btn { right: -12px; }
        .download-btn { right: 30px; }
        .message-wrapper:hover .copy-btn, .message-wrapper:hover .download-btn { opacity: 1; }
        .code-block { position: relative; margin: 10px 0; border-radius: 12px; overflow: hidden; }
        .code-block pre { margin: 0; padding: 16px; background: #1e1e2f; overflow-x: auto; }
        .code-block code { font-family: monospace; font-size: 0.9rem; }
        .typing-indicator span { display: inline-block; width: 6px; height: 6px; background: var(--text-muted); border-radius: 50%; margin: 0 2px; animation: bounce 1.4s infinite; }
        @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
        #input-container { width: 100%; padding: 0 18%; position: absolute; left: 0; transition: 0.6s; }
        #input-container.center-mode { top: 45%; transform: translateY(-50%); }
        #input-container.bottom-mode { top: 100%; transform: translateY(calc(-100% - 35px)); }
        #welcome-text { text-align: center; font-size: 2.8rem; font-weight: 700; margin-bottom: 32px; background: linear-gradient(180deg, var(--text-main) 0%, var(--text-muted) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; transition: 0.3s; }
        #input-container.bottom-mode #welcome-text { opacity: 0; pointer-events: none; }
        .input-box { display: flex; align-items: flex-end; width: 100%; max-width: 800px; margin: 0 auto; background: var(--input-bg); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 14px 18px; }
        #user-input { flex: 1; background: transparent; border: none; color: var(--text-main); font-size: 1rem; resize: none; outline: none; max-height: 180px; }
        #send-btn { background: var(--accent-color); border: none; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; margin-left: 12px; }
        .attach-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; margin-right: 8px; font-size: 1.4rem; }
        .image-preview { max-width: 200px; max-height: 150px; margin-top: 8px; border-radius: 12px; }
        @media (max-width: 700px) {
            #sidebar { width: 260px; padding: 16px 12px; }
            #chat-display { padding: 20px 12px 140px 12px; }
            .message { max-width: 90%; }
            #input-container { padding: 0 16px; }
            #welcome-text { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
<div id="sidebar" class="glass-panel">
    <div class="brand"><h2>🧠 Visione AI</h2></div>
    <button id="new-chat-btn" class="btn-glass"><span>✨</span> Nuova Chat</button>
    <div id="chat-list" class="chat-list-container"></div>
</div>
<main id="main-chat">
    <div id="chat-display"></div>
    <div id="input-container" class="center-mode">
        <h1 id="welcome-text">Come posso aiutarti? 🚀</h1>
        <div class="input-box">
            <button id="attach-image-btn" class="attach-btn" title="Carica immagine">📷</button>
            <textarea id="user-input" rows="1" placeholder="Chiedi qualcosa a Visione..."></textarea>
            <button id="send-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
        </div>
        <p class="footer-note">Visione AI • RAG + Web + Immagini/Audio (beta)</p>
        <input type="file" id="image-input" accept="image/*" style="display: none;">
    </div>
</main>
<script>
    // ========== CONFIGURAZIONE ==========
    const BACKEND_URL = 'https://web-production-69591.up.railway.app/'; // SOSTITUISCI
    const GROQ_API_KEY = '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';
    const GROQ_MODEL = 'llama-3.1-8b-instant';
    const GROQ_URL = 'https://api.groq.com/openai/v1/chat/completions';

    let allChats = {};
    let currentChatId = null;
    let currentImageBase64 = null;

    // Elementi DOM
    const chatDisplay = document.getElementById('chat-display');
    const inputContainer = document.getElementById('input-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const newChatBtn = document.getElementById('new-chat-btn');
    const chatList = document.getElementById('chat-list');
    const attachImageBtn = document.getElementById('attach-image-btn');
    const imageInput = document.getElementById('image-input');

    // Funzioni di storage
    function saveData() {
        localStorage.setItem('visione_all_chats', JSON.stringify(allChats));
        localStorage.setItem('visione_current_chat_id', currentChatId);
    }
    function loadData() {
        const saved = localStorage.getItem('visione_all_chats');
        if (saved) allChats = JSON.parse(saved);
        currentChatId = localStorage.getItem('visione_current_chat_id');
        if (currentChatId && !allChats[currentChatId]) currentChatId = null;
    }

    // Renderizza messaggio con Markdown e codice
    function renderMessage(content, role, isStream = false) {
        const wrapper = document.createElement('div');
        wrapper.className = `message-wrapper ${role === 'user' ? 'user-wrapper' : 'ai-wrapper'}`;
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role === 'user' ? 'msg-user' : 'msg-ai'}`;
        // Converti markdown e evidenzia codice
        let html = marked.parse(content);
        msgDiv.innerHTML = html;
        // Aggiungi pulsanti copia e download se contiene blocchi di codice
        if (content.includes('```')) {
            const codeBlocks = msgDiv.querySelectorAll('pre code');
            if (codeBlocks.length) {
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.innerHTML = '📋';
                copyBtn.onclick = () => { navigator.clipboard.writeText(content); copyBtn.innerHTML = '✅'; setTimeout(() => copyBtn.innerHTML = '📋', 1500); };
                msgDiv.appendChild(copyBtn);
                const downloadBtn = document.createElement('button');
                downloadBtn.className = 'download-btn';
                downloadBtn.innerHTML = '💾';
                downloadBtn.onclick = () => {
                    const blob = new Blob([content], {type: 'text/plain'});
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'visione_output.txt';
                    a.click();
                    URL.revokeObjectURL(a.href);
                };
                msgDiv.appendChild(downloadBtn);
            }
        } else {
            // Solo copia normale
            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.innerHTML = '📋';
            copyBtn.onclick = () => { navigator.clipboard.writeText(content); copyBtn.innerHTML = '✅'; setTimeout(() => copyBtn.innerHTML = '📋', 1500); };
            msgDiv.appendChild(copyBtn);
        }
        wrapper.appendChild(msgDiv);
        chatDisplay.appendChild(wrapper);
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
        // Evidenzia codice
        msgDiv.querySelectorAll('pre code').forEach((block) => hljs.highlightElement(block));
    }

    function showTyping() {
        const wrapper = document.createElement('div');
        wrapper.className = 'message-wrapper ai-wrapper';
        wrapper.id = 'typing-indicator';
        wrapper.innerHTML = `<div class="message msg-ai typing-indicator"><span></span><span></span><span></span></div>`;
        chatDisplay.appendChild(wrapper);
        chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }
    function hideTyping() { document.getElementById('typing-indicator')?.remove(); }

    // Aggiorna sidebar
    function updateSidebar() {
        chatList.innerHTML = '';
        const sorted = Object.keys(allChats).sort((a,b)=>b-a);
        for (let id of sorted) {
            const item = document.createElement('div');
            item.className = 'chat-list-item';
            if (id === currentChatId) item.classList.add('active');
            item.onclick = () => loadChat(id);
            const titleSpan = document.createElement('span');
            titleSpan.className = 'chat-title-text';
            titleSpan.innerText = allChats[id].title || 'Nuova conversazione';
            const delBtn = document.createElement('button');
            delBtn.className = 'delete-chat-btn';
            delBtn.innerHTML = '×';
            delBtn.onclick = (e) => { e.stopPropagation(); deleteChat(id); };
            item.appendChild(titleSpan);
            item.appendChild(delBtn);
            chatList.appendChild(item);
        }
    }

    function loadChat(id) {
        if (!allChats[id]) return;
        currentChatId = id;
        saveData();
        updateSidebar();
        chatDisplay.innerHTML = '';
        inputContainer.classList.remove('center-mode');
        inputContainer.classList.add('bottom-mode');
        chatDisplay.classList.add('active');
        for (let msg of allChats[id].history) {
            if (msg.role !== 'system') renderMessage(msg.content, msg.role);
        }
    }

    function deleteChat(id) {
        delete allChats[id];
        if (currentChatId === id) resetInterface();
        saveData();
        updateSidebar();
    }

    function resetInterface() {
        currentChatId = null;
        saveData();
        chatDisplay.innerHTML = '';
        chatDisplay.classList.remove('active');
        inputContainer.classList.remove('bottom-mode');
        inputContainer.classList.add('center-mode');
        updateSidebar();
        currentImageBase64 = null;
    }

    async function newChat() {
        resetInterface();
        currentChatId = Date.now().toString();
        allChats[currentChatId] = {
            title: 'Nuova conversazione',
            history: [{ role: 'system', content: 'Sei Visione, assistente intelligente. Rispondi in italiano.' }]
        };
        saveData();
        updateSidebar();
        inputContainer.classList.remove('center-mode');
        inputContainer.classList.add('bottom-mode');
        chatDisplay.classList.add('active');
    }

    // Chiamata al backend per RAG
    async function getRAGContext(question) {
        try {
            const res = await fetch(`${BACKEND_URL}/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: question })
            });
            const data = await res.json();
            if (data.response && !data.response.includes('Generazione automatica non disponibile')) return data.response;
            else return '';
        } catch(e) { return ''; }
    }

    // Ricerca web integrata
    async function searchWeb(query) {
        try {
            const res = await fetch(`${BACKEND_URL}/cerca_web`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query })
            });
            const data = await res.json();
            let resultsText = '';
            if (data.wikipedia) resultsText += '📚 Wikipedia:\n' + data.wikipedia.map(w => `- ${w.title}: ${w.snippet}`).join('\n') + '\n';
            if (data.duckduckgo) resultsText += '🦆 DuckDuckGo:\n' + data.duckduckgo.map(s => `- ${s}`).join('\n') + '\n';
            if (data.internet_archive) resultsText += '📦 Internet Archive:\n' + data.internet_archive.map(i => `- ${i.title}`).join('\n');
            return resultsText;
        } catch(e) { return ''; }
    }

    async function sendMessage() {
        let text = userInput.value.trim();
        if (!text && !currentImageBase64) return;
        if (!text && currentImageBase64) text = 'Descrivi questa immagine';
        if (!currentChatId) await newChat();
        // Mostra messaggio utente
        let userMsgContent = text;
        if (currentImageBase64) userMsgContent += `\n[Immagine in base64: ${currentImageBase64.substring(0,30)}...]`;
        renderMessage(userMsgContent, 'user');
        allChats[currentChatId].history.push({ role: 'user', content: userMsgContent });
        saveData();

        userInput.value = '';
        userInput.style.height = 'auto';
        const imageToSend = currentImageBase64;
        currentImageBase64 = null;

        showTyping();
        sendBtn.disabled = true;

        try {
            // 1. Ottieni contesto RAG dal backend
            let context = await getRAGContext(text);
            // 2. Se richiesto, ricerca web (se la domanda contiene parole come "cerca", "trova su internet")
            if (text.toLowerCase().includes('cerca') || text.toLowerCase().includes('web') || text.toLowerCase().includes('internet')) {
                const webResults = await searchWeb(text);
                if (webResults) context += '\n\nRisultati dal web:\n' + webResults;
            }
            // 3. Se c'è immagine, chiama backend per analizzarla (placeholder)
            let imageDescription = '';
            if (imageToSend) {
                try {
                    const imgRes = await fetch(`${BACKEND_URL}/analizza_immagine`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image_base64: imageToSend })
                    });
                    const imgData = await imgRes.json();
                    imageDescription = imgData.description || 'Immagine non analizzabile.';
                } catch(e) { imageDescription = 'Errore nell\'analisi immagine.'; }
            }

            // 4. Costruisci prompt con cronologia recente (ultimi 6 messaggi)
            const historyMessages = allChats[currentChatId].history.filter(m => m.role !== 'system').slice(-6);
            let prompt = `Sei Visione, assistente intelligente. Rispondi in italiano. Usa markdown se necessario.\n\n`;
            for (let msg of historyMessages) {
                prompt += `${msg.role === 'user' ? 'Utente' : 'Assistente'}: ${msg.content}\n`;
            }
            if (context) prompt += `\nInformazioni aggiuntive: ${context}\n`;
            if (imageDescription) prompt += `\nDescrizione immagine: ${imageDescription}\n`;
            prompt += `\nOra rispondi all'utente che ha appena detto: "${text}"\nRisposta:`;

            // 5. Chiamata Groq
            const groqResp = await fetch(GROQ_URL, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: GROQ_MODEL, messages: [{ role: 'user', content: prompt }], temperature: 0.7, max_tokens: 800 })
            });
            if (!groqResp.ok) throw new Error(`Groq error ${groqResp.status}`);
            const groqData = await groqResp.json();
            const answer = groqData.choices[0].message.content;

            hideTyping();
            renderMessage(answer, 'assistant');
            allChats[currentChatId].history.push({ role: 'assistant', content: answer });
            saveData();

            // Genera titolo se è il primo messaggio
            if (allChats[currentChatId].history.filter(m => m.role !== 'system').length === 2) {
                const titlePrompt = `Genera un titolo breve (max 6 parole) per questa conversazione che inizia con: "${text}"`;
                const titleResp = await fetch(GROQ_URL, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: GROQ_MODEL, messages: [{ role: 'user', content: titlePrompt }], temperature: 0.5, max_tokens: 30 })
                });
                const titleData = await titleResp.json();
                let newTitle = titleData.choices[0].message.content.trim();
                if (newTitle.length > 40) newTitle = newTitle.slice(0,40);
                allChats[currentChatId].title = newTitle;
                saveData();
                updateSidebar();
            }
        } catch (err) {
            hideTyping();
            renderMessage(`❌ Errore: ${err.message}`, 'assistant');
            allChats[currentChatId].history.push({ role: 'assistant', content: `Errore: ${err.message}` });
            saveData();
        } finally {
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    // Caricamento immagine
    attachImageBtn.onclick = () => imageInput.click();
    imageInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            currentImageBase64 = ev.target.result.split(',')[1]; // solo base64
            // Mostra preview nell'area input
            const preview = document.createElement('div');
            preview.className = 'image-preview';
            preview.innerHTML = `<img src="${ev.target.result}" style="max-width:100%; border-radius:12px;"><span style="font-size:0.8rem;">🗑️</span>`;
            const remove = preview.querySelector('span');
            remove.onclick = () => { currentImageBase64 = null; preview.remove(); };
            const inputBox = document.querySelector('.input-box');
            inputBox.parentNode.insertBefore(preview, inputBox.nextSibling);
        };
        reader.readAsDataURL(file);
    };

    // Eventi
    sendBtn.onclick = sendMessage;
    newChatBtn.onclick = newChat;
    userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    userInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; });

    // Inizializza
    loadData();
    if (currentChatId && allChats[currentChatId]) loadChat(currentChatId);
    else resetInterface();
</script>
</body>
</html>
