<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Visione AI - Assistente Intelligente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .chat-card {
            width: 100%;
            max-width: 900px;
            height: 95vh;
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 36px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* Header con effetto vetro */
        .chat-header {
            padding: 1.2rem 1.5rem;
            background: rgba(10, 15, 30, 0.7);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 2rem;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }

        .title {
            flex: 1;
        }

        .title h1 {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #a0c0ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .badge {
            background: rgba(0, 120, 255, 0.2);
            backdrop-filter: blur(4px);
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #aad0ff;
            border: 1px solid rgba(0, 160, 255, 0.4);
        }

        /* Area messaggi */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 18px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        /* Personalizzazione scroll */
        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(0,160,255,0.5);
            border-radius: 10px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
            animation: fadeSlideUp 0.25s ease;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .message.user {
            align-self: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .bubble {
            padding: 12px 18px;
            border-radius: 28px;
            line-height: 1.45;
            font-size: 0.95rem;
            word-wrap: break-word;
            white-space: pre-wrap;
            transition: all 0.1s;
        }

        .user .bubble {
            background: linear-gradient(135deg, #007aff, #0055cc);
            color: white;
            border-bottom-right-radius: 6px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        }

        .assistant .bubble {
            background: rgba(30, 40, 60, 0.9);
            backdrop-filter: blur(8px);
            color: #f0f3ff;
            border-bottom-left-radius: 6px;
            border: 0.5px solid rgba(255,255,255,0.15);
        }

        .timestamp {
            font-size: 0.65rem;
            margin: 4px 12px 0;
            opacity: 0.5;
            color: #b0c4ff;
        }

        /* Input area */
        .chat-input-area {
            background: rgba(10, 15, 30, 0.7);
            padding: 14px 18px;
            display: flex;
            gap: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
        }

        .chat-input-area input {
            flex: 1;
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 44px;
            padding: 14px 18px;
            font-size: 1rem;
            color: white;
            outline: none;
            transition: all 0.2s;
        }

        .chat-input-area input:focus {
            border-color: #007aff;
            background: rgba(255,255,255,0.18);
            box-shadow: 0 0 0 3px rgba(0,122,255,0.2);
        }

        .chat-input-area input::placeholder {
            color: rgba(255,255,255,0.5);
            font-weight: 400;
        }

        .chat-input-area button {
            background: #007aff;
            border: none;
            border-radius: 44px;
            padding: 0 26px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .chat-input-area button:hover {
            background: #005ecb;
            transform: scale(0.97);
        }

        .chat-input-area button:active {
            transform: scale(0.96);
        }

        button:disabled, input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: rgba(30, 40, 60, 0.7);
            border-radius: 28px;
            width: fit-content;
            backdrop-filter: blur(6px);
            margin-bottom: 10px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #aad0ff;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-6px); opacity: 1; }
        }

        /* comandi rapidi (suggerimenti) */
        .quick-commands {
            display: flex;
            gap: 10px;
            padding: 10px 18px 14px;
            overflow-x: auto;
            background: rgba(0,0,0,0.2);
            border-top: 0.5px solid rgba(255,255,255,0.05);
        }
        .chip {
            background: rgba(0, 122, 255, 0.2);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #bbd9ff;
            white-space: nowrap;
            cursor: pointer;
            transition: 0.1s;
            border: 0.5px solid rgba(0,122,255,0.4);
        }
        .chip:active {
            background: #007aff;
            color: white;
            transform: scale(0.96);
        }

        @media (max-width: 550px) {
            .chat-card {
                height: 100vh;
                max-width: 100%;
                border-radius: 0;
            }
            .message {
                max-width: 90%;
            }
            .title h1 {
                font-size: 1.3rem;
            }
            .badge {
                font-size: 0.65rem;
            }
            .chat-header {
                padding: 0.9rem 1rem;
            }
            .chat-messages {
                padding: 16px 12px;
            }
        }
    </style>
</head>
<body>
<div class="chat-card">
    <div class="chat-header">
        <div class="logo">🧠</div>
        <div class="title">
            <h1>Visione AI</h1>
        </div>
        <div class="badge">RAG + Wikipedia</div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="message assistant">
            <div class="bubble">
                ✨ Ciao! Sono Visione, la tua assistente connessa a Wikipedia e al mio database personale. <br>
                Puoi chiedermi qualsiasi cosa, userò il web per darti risposte aggiornate.
            </div>
            <div class="timestamp"></div>
        </div>
    </div>

    <div class="quick-commands" id="quickCommands">
        <div class="chip" data-msg="Chi è Eros Ramazzotti?">🎤 Eros Ramazzotti</div>
        <div class="chip" data-msg="Spiegami l'HTML">📄 HTML</div>
        <div class="chip" data-msg="Cos'è il machine learning?">🤖 Machine learning</div>
        <div class="chip" data-msg="/stato">📊 Statistiche</div>
    </div>

    <div class="chat-input-area">
        <input type="text" id="messageInput" placeholder="Scrivi un messaggio..." autofocus>
        <button id="sendBtn">➤ Invia</button>
    </div>
</div>

<script>
    // ==== CONFIGURAZIONE BACKEND ====
    const BACKEND_URL = 'https://visione-server.onrender.com';   // <-- il tuo URL backend

    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(role, text, isError = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        if (isError && role === 'assistant') {
            bubble.style.background = 'rgba(200,60,50,0.8)';
        }
        bubble.textContent = text;
        messageDiv.appendChild(bubble);
        const timestamp = document.createElement('div');
        timestamp.className = 'timestamp';
        timestamp.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
        messageDiv.appendChild(timestamp);
        chatMessages.appendChild(messageDiv);
        scrollToBottom();
        return messageDiv;
    }

    function showTyping() {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'typing-indicator';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div><span style="margin-left:6px;">Visione sta pensando...</span>';
        chatMessages.appendChild(typingDiv);
        scrollToBottom();
    }

    function removeTyping() {
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
    }

    function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function sendMessage(message) {
        if (!message.trim()) return;
        // Disabilita temporaneamente
        sendBtn.disabled = true;
        messageInput.disabled = true;

        addMessage('user', message);
        messageInput.value = '';
        showTyping();

        try {
            const response = await fetch(`${BACKEND_URL}/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            const data = await response.json();
            removeTyping();
            if (data.response) {
                addMessage('assistant', data.response);
            } else {
                addMessage('assistant', 'Risposta vuota dal server.', true);
            }
        } catch (error) {
            removeTyping();
            console.error(error);
            addMessage('assistant', '⚠️ Errore di connessione: backend non raggiungibile. Verifica che il server sia attivo.', true);
        } finally {
            sendBtn.disabled = false;
            messageInput.disabled = false;
            messageInput.focus();
        }
    }

    function sendCurrentMessage() {
        const msg = messageInput.value.trim();
        if (msg) sendMessage(msg);
    }

    sendBtn.addEventListener('click', sendCurrentMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendCurrentMessage();
    });

    // Aggiunta chip veloci
    document.querySelectorAll('.chip').forEach(chip => {
        chip.addEventListener('click', (e) => {
            const txt = chip.getAttribute('data-msg');
            if (txt) {
                messageInput.value = txt;
                sendCurrentMessage();
            }
        });
    });
</script>
</body>
</html>
