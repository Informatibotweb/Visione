<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visione AI - Chat Intelligente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 90%;
            max-width: 1000px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .chat-header {
            background: rgba(0,0,0,0.5);
            padding: 16px 20px;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chat-header h1 {
            font-size: 1.5rem;
            margin: 0;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }
        .message.user {
            align-self: flex-end;
        }
        .message.assistant {
            align-self: flex-start;
        }
        .bubble {
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.4;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .user .bubble {
            background: #007aff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .assistant .bubble {
            background: rgba(255,255,255,0.9);
            color: #1e1e2f;
            border-bottom-left-radius: 4px;
        }
        .timestamp {
            font-size: 0.7rem;
            margin-top: 4px;
            margin-left: 12px;
            margin-right: 12px;
            opacity: 0.6;
            color: white;
        }
        .chat-input-area {
            background: rgba(0,0,0,0.5);
            padding: 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 30px;
            background: rgba(255,255,255,0.9);
            font-size: 1rem;
            outline: none;
        }
        .chat-input-area button {
            background: #007aff;
            border: none;
            border-radius: 30px;
            padding: 0 24px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }
        .chat-input-area button:hover {
            background: #005bbf;
        }
        .chat-input-area button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        .typing {
            color: #ccc;
            font-style: italic;
            margin-left: 20px;
        }
        @media (max-width: 600px) {
            .message { max-width: 95%; }
            .chat-header h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <span>🧠</span>
        <h1>Visione AI</h1>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="message assistant">
            <div class="bubble">
                Ciao! Sono Visione, la tua assistente intelligente. Posso cercare nel mio database o su Wikipedia per rispondere alle tue domande.
            </div>
            <div class="timestamp"></div>
        </div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="messageInput" placeholder="Scrivi un messaggio..." autofocus>
        <button id="sendBtn">➤ Invia</button>
    </div>
</div>

<script>
    // 🔁 IMPOSTA QUI L'URL DEL TUO BACKEND SU RENDER
    const BACKEND_URL = 'https://visione-server.onrender.com';  // <-- SOSTITUISCI

    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(role, text) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = text;
        messageDiv.appendChild(bubble);
        const timestamp = document.createElement('div');
        timestamp.className = 'timestamp';
        timestamp.textContent = new Date().toLocaleTimeString();
        messageDiv.appendChild(timestamp);
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function showTyping() {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message assistant typing-message';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = '<div class="bubble">🧠 Visione sta pensando...</div>';
        chatMessages.appendChild(typingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function removeTyping() {
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
    }

    async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message) return;
        sendBtn.disabled = true;
        messageInput.disabled = true;

        addMessage('user', message);
        messageInput.value = '';
        showTyping();

        try {
            const response = await fetch(`${BACKEND_URL}/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            removeTyping();
            if (data.response) {
                addMessage('assistant', data.response);
            } else {
                addMessage('assistant', 'Mi dispiace, si è verificato un errore.');
            }
        } catch (error) {
            removeTyping();
            addMessage('assistant', 'Errore di connessione al server. Assicurati che il backend sia attivo.');
            console.error(error);
        } finally {
            sendBtn.disabled = false;
            messageInput.disabled = false;
            messageInput.focus();
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
