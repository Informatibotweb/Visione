<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visione AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-page: #f5f5f0;
            --bg-sidebar: #f0ede8;
            --bg-chat: #ffffff;
            --bg-input: #ffffff;
            --bg-user-bubble: #1a1a1a;
            --bg-assistant-bubble: #f0ede8;
            --text-primary: #1a1a1a;
            --text-secondary: #6b6b6b;
            --text-muted: #999;
            --text-user-bubble: #ffffff;
            --text-assistant-bubble: #1a1a1a;
            --border: #e4e1dc;
            --accent: #b48a6d;
            --accent-hover: #9a7458;
            --sidebar-width: 260px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-page: #111110;
                --bg-sidebar: #161614;
                --bg-chat: #1a1a18;
                --bg-input: #222220;
                --bg-user-bubble: #e8e4dc;
                --bg-assistant-bubble: #222220;
                --text-primary: #e8e4dc;
                --text-secondary: #999;
                --text-muted: #666;
                --text-user-bubble: #1a1a1a;
                --text-assistant-bubble: #e8e4dc;
                --border: #2a2a28;
                --accent: #c49a7d;
                --accent-hover: #d4aa8d;
            }
        }

        html, body {
            height: 100%;
            font-family: var(--font);
            background: var(--bg-page);
            color: var(--text-primary);
        }

        /* ── Layout shell ── */
        .shell {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            padding: 20px 16px;
            gap: 24px;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px 4px;
        }

        .logo-mark {
            width: 30px;
            height: 30px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            flex-shrink: 0;
        }

        .logo-name {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: var(--text-primary);
        }

        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-size: 13.5px;
            font-family: var(--font);
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            width: 100%;
            text-align: left;
        }

        .new-chat-btn:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        .new-chat-btn svg {
            flex-shrink: 0;
            opacity: 0.6;
        }

        .sidebar-section-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 0 4px;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            overflow-y: auto;
        }

        .history-item {
            padding: 8px 10px;
            border-radius: var(--radius-sm);
            font-size: 13.5px;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.15s;
        }

        .history-item:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        .history-item.active {
            background: var(--border);
            color: var(--text-primary);
            font-weight: 500;
        }

        .sidebar-footer {
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }

        .sidebar-footer-text {
            font-size: 11.5px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* ── Main area ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-chat);
            min-width: 0;
        }

        /* ── Top bar ── */
        .topbar {
            height: 52px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            gap: 12px;
            flex-shrink: 0;
        }

        .topbar-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .topbar-badge {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            background: var(--bg-assistant-bubble);
            color: var(--accent);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2px 9px;
        }

        /* ── Chat messages ── */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            max-width: 760px;
            width: 100%;
            margin: 0 auto;
        }

        .message {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .message.user .avatar {
            background: var(--bg-user-bubble);
            color: var(--text-user-bubble);
            font-size: 11px;
        }

        .message.assistant .avatar {
            background: var(--accent);
            color: #fff;
            font-size: 14px;
        }

        .message-body {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: calc(100% - 48px);
        }

        .message.user .message-body {
            align-items: flex-end;
        }

        .bubble {
            padding: 11px 15px;
            border-radius: var(--radius-md);
            line-height: 1.55;
            font-size: 14.5px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.user .bubble {
            background: var(--bg-user-bubble);
            color: var(--text-user-bubble);
            border-bottom-right-radius: 4px;
        }

        .message.assistant .bubble {
            background: var(--bg-assistant-bubble);
            color: var(--text-assistant-bubble);
            border-bottom-left-radius: 4px;
        }

        .timestamp {
            font-size: 11px;
            color: var(--text-muted);
            padding: 0 4px;
        }

        /* Typing indicator */
        .typing-message .bubble {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 13px 16px;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: bounce 1.2s infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-5px); opacity: 1; }
        }

        /* ── Input area ── */
        .chat-input-wrapper {
            border-top: 1px solid var(--border);
            padding: 16px 24px 20px;
            background: var(--bg-chat);
            flex-shrink: 0;
        }

        .input-inner {
            max-width: 760px;
            margin: 0 auto;
        }

        .chat-input-area {
            display: flex;
            align-items: center;
            gap: 0;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 8px 8px 8px 18px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .chat-input-area:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
        }

        .chat-input-area input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            font-size: 14.5px;
            font-family: var(--font);
            color: var(--text-primary);
            min-width: 0;
            padding: 4px 0;
        }

        .chat-input-area input::placeholder {
            color: var(--text-muted);
        }

        .chat-input-area button {
            background: var(--accent);
            border: none;
            border-radius: 12px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            flex-shrink: 0;
        }

        .chat-input-area button:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        .chat-input-area button:active:not(:disabled) {
            transform: scale(0.95);
        }

        .chat-input-area button:disabled {
            background: var(--border);
            cursor: not-allowed;
        }

        .chat-input-area button svg {
            width: 16px;
            height: 16px;
        }

        .input-hint {
            text-align: center;
            font-size: 11.5px;
            color: var(--text-muted);
            margin-top: 10px;
        }

        /* ── Empty state / welcome ── */
        .welcome {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 12px;
            padding: 40px 24px;
            flex: 1;
            max-width: 480px;
            margin: 0 auto;
        }

        .welcome-icon {
            width: 52px;
            height: 52px;
            background: var(--accent);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 4px;
        }

        .welcome h2 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.4px;
            color: var(--text-primary);
        }

        .welcome p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            max-width: 340px;
        }

        /* ── Scrollbar ── */
        .chat-messages::-webkit-scrollbar,
        .history-list::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track,
        .history-list::-webkit-scrollbar-track { background: transparent; }
        .chat-messages::-webkit-scrollbar-thumb,
        .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* ── Mobile ── */
        @media (max-width: 640px) {
            .sidebar { display: none; }
            .chat-messages { padding: 20px 16px; }
            .chat-input-wrapper { padding: 12px 16px 16px; }
            .topbar { padding: 0 16px; }
        }
    </style>
</head>
<body>
<div class="shell">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-mark">✦</div>
            <span class="logo-name">Visione AI</span>
        </div>

        <button class="new-chat-btn" onclick="location.reload()">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                <path d="M7 1v12M1 7h12"/>
            </svg>
            Nuova conversazione
        </button>

        <div>
            <div class="sidebar-section-label">Recenti</div>
            <div class="history-list" id="historyList">
                <!-- populated by JS below -->
            </div>
        </div>

        <div class="sidebar-footer">
            <p class="sidebar-footer-text">Visione AI · Basato su backend Render</p>
        </div>
    </aside>

    <!-- Main -->
    <main class="main">
        <div class="topbar">
            <span class="topbar-title">Conversazione</span>
            <span class="topbar-badge">AI</span>
        </div>

        <div class="chat-messages" id="chatMessages">
            <!-- Welcome shown when empty; hidden on first message -->
            <div class="welcome" id="welcomeScreen">
                <div class="welcome-icon">✦</div>
                <h2>Ciao, sono Visione</h2>
                <p>Posso cercare nel mio database o su Wikipedia per rispondere alle tue domande. Inizia pure a scrivere.</p>
            </div>
        </div>

        <div class="chat-input-wrapper">
            <div class="input-inner">
                <div class="chat-input-area">
                    <input type="text" id="messageInput" placeholder="Scrivi un messaggio…" autofocus>
                    <button id="sendBtn" aria-label="Invia">
                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 8h10M9 4l4 4-4 4"/>
                        </svg>
                    </button>
                </div>
                <p class="input-hint">Premi Invio o clicca per inviare</p>
            </div>
        </div>
    </main>

</div>

<script>
    // 🔁 IMPOSTA QUI L'URL DEL TUO BACKEND SU RENDER
    const BACKEND_URL = 'https://visione-server.onrender.com';  // <-- SOSTITUISCI

    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(role, text) {
        const welcomeScreen = document.getElementById('welcomeScreen');
        if (welcomeScreen) welcomeScreen.remove();

        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = role === 'user' ? 'Tu' : '✦';

        const body = document.createElement('div');
        body.className = 'message-body';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = text;
        body.appendChild(bubble);

        const timestamp = document.createElement('div');
        timestamp.className = 'timestamp';
        timestamp.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        body.appendChild(timestamp);

        messageDiv.appendChild(avatar);
        messageDiv.appendChild(body);
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;

        saveToLocalStorage();
    }

    function showTyping() {
        const welcomeScreen = document.getElementById('welcomeScreen');
        if (welcomeScreen) welcomeScreen.remove();

        const typingDiv = document.createElement('div');
        typingDiv.className = 'message assistant typing-message';
        typingDiv.id = 'typingIndicator';

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = '✦';

        const body = document.createElement('div');
        body.className = 'message-body';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
        body.appendChild(bubble);

        typingDiv.appendChild(avatar);
        typingDiv.appendChild(body);
        chatMessages.appendChild(typingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function removeTyping() {
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
    }

    // ── LocalStorage ──
    const STORAGE_KEY = 'visione_chat_history';

    function saveToLocalStorage() {
        const messages = [];
        chatMessages.querySelectorAll('.message:not(.typing-message)').forEach(el => {
            const role = el.classList.contains('user') ? 'user' : 'assistant';
            const text = el.querySelector('.bubble')?.textContent || '';
            const time = el.querySelector('.timestamp')?.textContent || '';
            if (text) messages.push({ role, text, time });
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
        renderHistory(messages);
    }

    function loadFromLocalStorage() {
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (!saved) return;
            const messages = JSON.parse(saved);
            if (!messages.length) return;
            const welcomeScreen = document.getElementById('welcomeScreen');
            if (welcomeScreen) welcomeScreen.remove();
            messages.forEach(({ role, text, time }) => {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${role}`;
                const avatar = document.createElement('div');
                avatar.className = 'avatar';
                avatar.textContent = role === 'user' ? 'Tu' : '✦';
                const body = document.createElement('div');
                body.className = 'message-body';
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.textContent = text;
                body.appendChild(bubble);
                const timestamp = document.createElement('div');
                timestamp.className = 'timestamp';
                timestamp.textContent = time;
                body.appendChild(timestamp);
                messageDiv.appendChild(avatar);
                messageDiv.appendChild(body);
                chatMessages.appendChild(messageDiv);
            });
            chatMessages.scrollTop = chatMessages.scrollHeight;
            renderHistory(messages);
        } catch(e) { /* ignore */ }
    }

    function renderHistory(messages) {
        const list = document.getElementById('historyList');
        if (!list) return;
        const userMsgs = messages.filter(m => m.role === 'user');
        if (!userMsgs.length) { list.innerHTML = ''; return; }
        const first = userMsgs[0].text.slice(0, 36) + (userMsgs[0].text.length > 36 ? '…' : '');
        list.innerHTML = `<div class="history-item active">${first}</div>`;
    }

    async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message) return;
        sendBtn.disabled = true;
        messageInput.disabled = true;

        addMessage('user', message);
        messageInput.value = '';
        showTyping();

        try {
            const response = await fetch(`${BACKEND_URL}/chat`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            removeTyping();
            if (data.response) {
                addMessage('assistant', data.response);
            } else {
                addMessage('assistant', 'Mi dispiace, si è verificato un errore.');
            }
        } catch (error) {
            removeTyping();
            addMessage('assistant', 'Errore di connessione al server. Assicurati che il backend sia attivo.');
            console.error(error);
        } finally {
            sendBtn.disabled = false;
            messageInput.disabled = false;
            messageInput.focus();
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    // Load history on startup
    loadFromLocalStorage();
</script>
</body>
</html>
