<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visione // Dev Edition - Nexiquar</title>
    <!-- Google Fonts & Marked.js per il rendering del Markdown -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --bg-principal: #0a0b0d;
            --bg-card: rgba(18, 20, 26, 0.65);
            --quar-gold: #d4af37;
            --quar-gold-glow: rgba(212, 175, 55, 0.3);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border-color: rgba(212, 175, 55, 0.15);
            --console-bg: #111216;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-principal);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% -20%, rgba(212, 175, 55, 0.08), transparent 70%);
        }

        /* --- HEADER QUAR STYLE --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 30px;
            background: rgba(10, 11, 13, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            border: 2px solid var(--quar-gold);
            border-radius: 8px;
            box-shadow: 0 0 10px var(--quar-gold-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--quar-gold);
            font-size: 14px;
        }

        header h1 {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        header h1 span {
            color: var(--quar-gold);
            text-shadow: 0 0 8px var(--quar-gold-glow);
        }

        .badge-system {
            font-size: 11px;
            background: rgba(212, 175, 55, 0.1);
            border: 1px solid var(--quar-gold);
            color: var(--quar-gold);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
        }

        /* --- WORKSPACE LAYOUT --- */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 20px 30px;
            overflow-y: auto;
        }

        .messages-wrapper {
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* --- MESSAGES & MARKDOWN RENDERING --- */
        .message {
            max-width: 90%;
            padding: 20px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 15px;
            animation: fadeIn 0.3s ease-out;
        }

        .message.user {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            align-self: flex-end;
            border-left: 3px solid var(--text-muted);
        }

        .message.visione {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(16px);
            align-self: flex-start;
            border-left: 3px solid var(--quar-gold);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }

        /* Tabella di Ragionamento in 6 Fasi */
        .message table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 13px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.15);
        }

        .message th {
            background: rgba(212, 175, 55, 0.1);
            color: var(--quar-gold);
            text-align: left;
            padding: 12px;
            font-weight: 600;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .message td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: var(--text-main);
        }

        .message tr:last-child td {
            border-bottom: none;
        }

        /* Blocchi di Codice Estratti */
        .message pre {
            background: var(--console-bg) !important;
            padding: 18px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 16px 0;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
        }

        .message code {
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            color: #e5e7eb;
        }

        .message p {
            margin-bottom: 12px;
        }

        .message h3 {
            color: var(--quar-gold);
            margin: 14px 0 8px 0;
            font-size: 16px;
        }

        /* --- INPUT BAR AREA --- */
        .input-area {
            padding: 20px 0 10px 0;
            background: transparent;
        }

        .input-box-wrapper {
            position: relative;
            display: flex;
            background: rgba(18, 20, 26, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 6px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .input-box-wrapper:focus-within {
            border-color: var(--quar-gold);
            box-shadow: 0 0 12px var(--quar-gold-glow);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            padding: 12px;
            resize: none;
            height: 52px;
            max-height: 150px;
        }

        .send-btn {
            background: var(--quar-gold);
            color: #000;
            border: none;
            padding: 0 22px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            background: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
        }

        /* --- LOADING LOADER --- */
        .loader-container {
            display: none;
            align-self: flex-start;
            gap: 8px;
            padding: 16px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--quar-gold);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--quar-gold); }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo-icon">V</div>
            <h1>Visione // <span>Dev Edition</span></h1>
        </div>
        <div class="badge-system">NEXIQUAR ECOSYSTEM</div>
    </header>

    <div class="workspace">
        <div class="chat-container">
            <div class="messages-wrapper" id="chatWrapper">
                
                <!-- Messaggio di Benvenuto -->
                <div class="message visione">
                    <p><strong>Visione Dev Engine Attivo.</strong> Sforna pure le tue richieste software. Analizzerò l'intento compilando la pipeline logica in 6 fasi prima di generare l'architettura finale del codice.</p>
                </div>

                <!-- Loader Animato temporaneo -->
                <div class="loader-container" id="pipelineLoader">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>

            </div>

            <!-- Input Bar -->
            <div class="input-area">
                <div class="input-box-wrapper">
                    <textarea id="userInput" placeholder="Descrivi il componente software o la macro da fixare... (Invia con Invio)"></textarea>
                    <button class="send-btn" id="sendBtn">Sforna</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAZIONE ENDPOINT RAILWAY
        // Incolla qui l'URL pubblico fornito dalla dashboard di Railway
        const RAILWAY_URL = "illustrious-friendship-production-53dd.up.railway.app";

        const chatWrapper = document.getElementById('chatWrapper');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const loader = document.getElementById('pipelineLoader');

        // Configura Marked per gestire i ritorni a capo in modo nativo del Markdown
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        async function inviaRichiesta() {
            const messaggio = userInput.value.trim();
            if (!messaggio) return;

            // 1. Svuota l'input e mostra il messaggio dell'utente a schermo
            userInput.value = '';
            appendMessage(messaggio, 'user');

            // 2. Sposta il loader in fondo e mostralo
            chatWrapper.appendChild(loader);
            loader.style.display = 'flex';
            chatWrapper.scrollTop = chatWrapper.scrollHeight;

            try {
                // 3. Esegui la chiamata POST al motore di Visione su Railway
                const response = await fetch(RAILWAY_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: messaggio,
                        session_id: "quar_desktop_session"
                    })
                });

                if (!response.ok) throw new Error("Errore nella risposta del server cloud.");

                const data = await response.json();
                
                // 4. Nascondi il loader e stampa la risposta strutturata
                loader.style.display = 'none';
                appendMessage(data.response, 'visione', true);

            } catch (error) {
                loader.style.display = 'none';
                appendMessage(`❌ **Fallimento di connessione con il motore Dev Engine:** ${error.message}`, 'visione', true);
            }
        }

        function appendMessage(testo, mittente, isMarkdown = false) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', mittente);

            if (isMarkdown) {
                // Renderizza la tabella MD e il codice tramite marked.js
                msgDiv.innerHTML = marked.parse(testo);
            } else {
                msgDiv.innerText = testo;
            }

            chatWrapper.insertBefore(msgDiv, loader);
            chatWrapper.scrollTop = chatWrapper.scrollHeight;
        }

        // Listener Eventi
        sendBtn.addEventListener('click', inviaRichiesta);
        
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                inviaRichiesta();
            }
        });
    </script>
</body>
</html>
