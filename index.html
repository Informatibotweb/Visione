<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Visione AI - Chat Intelligente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .chat-container {
            width: 100%;
            max-width: 1100px;
            height: 95vh;
            background: rgba(20, 20, 35, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .chat-header {
            background: rgba(0,0,0,0.5);
            padding: 16px 20px;
            color: white;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .chat-header h1 {
            font-size: 1.6rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header .badge {
            background: #007aff;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: normal;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .message.user {
            align-self: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .bubble {
            padding: 12px 18px;
            border-radius: 26px;
            line-height: 1.45;
            word-wrap: break-word;
            font-size: 1rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .user .bubble {
            background: #007aff;
            color: white;
            border-bottom-right-radius: 6px;
        }

        .assistant .bubble {
            background: rgba(255,255,255,0.92);
            color: #1a1a2e;
            border-bottom-left-radius: 6px;
        }

        .timestamp {
            font-size: 0.7rem;
            margin-top: 4px;
            margin-left: 12px;
            margin-right: 12px;
            opacity: 0.6;
            color: #ddd;
        }

        .chat-input-area {
            background: rgba(0,0,0,0.5);
            padding: 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid rgba(255,255,255,0.15);
        }

        .chat-input-area input {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 40px;
            background: rgba(255,255,255,0.9);
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .chat-input-area input:focus {
            background: white;
            box-shadow: 0 0 0 2px #007aff;
        }

        .chat-input-area button {
            background: #007aff;
            border: none;
            border-radius: 40px;
            padding: 0 28px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .chat-input-area button:hover {
            background: #005bbf;
            transform: scale(0.97);
        }

        .chat-input-area button:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            align-items: center;
            padding: 10px 16px;
            background: rgba(255,255,255,0.2);
            border-radius: 24px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
            30% { opacity: 1; transform: scale(1.2); }
        }

        @media (max-width: 600px) {
            .message { max-width: 95%; }
            .chat-header h1 { font-size: 1.3rem; }
            .chat-input-area button { padding: 0 20px; }
            .bubble { font-size: 0.95rem; }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h1>🧠 Visione AI <span class="badge">v16.0</span></h1>
        <div style="flex:1"></div>
        <div style="font-size:0.8rem; opacity:0.7;">RAG + Groq</div>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="message assistant">
            <div class="bubble">
                Ciao! Sono Visione. Ho una memoria di <strong>7178 pagine</strong> già nel mio cervello. Cosa desideri sapere?
            </div>
            <div class="timestamp"></div>
        </div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="messageInput" placeholder="Scrivi un messaggio..." autofocus>
        <button id="sendBtn">➤ Invia</button>
    </div>
</div>

<script>
    // 🔁 IMPOSTA QUI L'URL DEL TUO BACKEND SU RENDER (senza slash finale)
    const BACKEND_URL = 'https://visione-server.onrender.com';

    const chatMessages = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(role, text) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${role}`;
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = text;
        messageDiv.appendChild(bubble);
        const timestamp = document.createElement('div');
        timestamp.className = 'timestamp';
        const now = new Date();
        timestamp.textContent = now.toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
        messageDiv.appendChild(timestamp);
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return messageDiv;
    }

    function showTyping() {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message assistant';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span><span style="margin-left:6px;">Visione sta pensando...</span></div>`;
        chatMessages.appendChild(typingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function removeTyping() {
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
    }

    async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message) return;

        // Disabilita input durante l'invio
        sendBtn.disabled = true;
        messageInput.disabled = true;

        addMessage('user', message);
        messageInput.value = '';
        showTyping();

        try {
            const response = await fetch(`${BACKEND_URL}/chat`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            removeTyping();
            if (data.response) {
                addMessage('assistant', data.response);
            } else {
                addMessage('assistant', 'Mi dispiace, risposta non valida dal server.');
            }
        } catch (error) {
            removeTyping();
            addMessage('assistant', `⚠️ Errore di connessione: ${error.message}. Verifica che il backend sia attivo su ${BACKEND_URL}`);
            console.error('Errore fetch:', error);
        } finally {
            sendBtn.disabled = false;
            messageInput.disabled = false;
            messageInput.focus();
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
