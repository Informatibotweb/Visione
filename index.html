<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Visione AI - Assistente Mobile</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <!-- Librerie -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            height: 100dvh;
            overflow: hidden;
            position: relative;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #060608; color: #f5f5f7; }
        }

        /* Pulsante menu hamburger */
        .menu-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 1000;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 30px;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        @media (prefers-color-scheme: dark) {
            .menu-btn { background: rgba(30,30,35,0.8); border-color: rgba(255,255,255,0.1); color: white; }
        }
        /* Sidebar nascosta */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: rgba(240,240,245,0.95);
            backdrop-filter: blur(30px);
            border-right: 1px solid rgba(0,0,0,0.1);
            z-index: 1001;
            transition: left 0.3s ease;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 12px rgba(0,0,0,0.1);
        }
        @media (prefers-color-scheme: dark) {
            .sidebar { background: rgba(20,20,25,0.95); border-color: rgba(255,255,255,0.1); }
        }
        .sidebar.open { left: 0; }
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
        }
        .sidebar-overlay.active { opacity: 1; visibility: visible; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .sidebar-header h2 { font-size: 1.3rem; }
        .close-sidebar { background: none; border: none; font-size: 1.8rem; cursor: pointer; color: inherit; }
        .btn-glass {
            background: rgba(255,255,255,0.7);
            border: 1px solid rgba(0,0,0,0.1);
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 20px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
        }
        @media (prefers-color-scheme: dark) { .btn-glass { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); } }
        .chat-list-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .chat-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            background: rgba(255,255,255,0.3);
        }
        @media (prefers-color-scheme: dark) { .chat-list-item { background: rgba(255,255,255,0.05); } }
        .chat-list-item.active { background: rgba(0,113,227,0.2); }
        .delete-chat-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #ff3b30; opacity: 0.6; }

        /* Area chat principale */
        .main-chat {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            width: 100%;
            position: relative;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 80px 16px 90px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }
        .message-wrapper { display: flex; width: 100%; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            line-height: 1.45;
            font-size: 0.95rem;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .user-wrapper { justify-content: flex-end; }
        .user-wrapper .message { background: #007aff; color: white; border-bottom-right-radius: 4px; }
        .ai-wrapper { justify-content: flex-start; }
        .ai-wrapper .message { background: rgba(255,255,255,0.8); color: #1d1d1f; border-bottom-left-radius: 4px; }
        @media (prefers-color-scheme: dark) { .ai-wrapper .message { background: rgba(255,255,255,0.1); color: #f5f5f7; } }

        /* Pulsanti copia/download */
        .copy-btn, .download-btn {
            position: absolute;
            top: -8px;
            background: rgba(0,0,0,0.6);
            border: none;
            border-radius: 20px;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.75rem;
            color: white;
            opacity: 0;
            transition: 0.1s;
        }
        .copy-btn { right: -8px; }
        .download-btn { right: 24px; }
        .message-wrapper:hover .copy-btn,
        .message-wrapper:hover .download-btn { opacity: 1; }
        @media (max-width: 700px) {
            .copy-btn, .download-btn { opacity: 0.6; }  /* sempre visibili su mobile */
        }

        /* Input fisso in basso */
        .input-area {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0,0,0,0.1);
            padding: 12px 16px 20px 16px;
            z-index: 100;
        }
        @media (prefers-color-scheme: dark) { .input-area { background: rgba(20,20,25,0.9); border-color: rgba(255,255,255,0.1); } }
        .input-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.5);
            border-radius: 28px;
            padding: 8px 12px;
        }
        @media (prefers-color-scheme: dark) { .input-container { background: rgba(255,255,255,0.1); } }
        .attach-btn, #sendBtn {
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .attach-btn img, #sendBtn img {
            width: 28px;
            height: 28px;
        }
        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            font-size: 1rem;
            padding: 8px 0;
            resize: none;
            outline: none;
            max-height: 120px;
            font-family: inherit;
        }
        .image-preview {
            margin-bottom: 8px;
            max-width: 100px;
            position: relative;
            display: inline-block;
        }
        .image-preview img { width: 80px; border-radius: 12px; }
        .remove-img { position: absolute; top: -8px; right: -8px; background: rgba(0,0,0,0.6); border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; cursor: pointer; }

        .typing-indicator { display: flex; gap: 4px; padding: 8px 12px; }
        .typing-indicator span { width: 8px; height: 8px; background: gray; border-radius: 50%; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }

        pre { margin: 8px 0; overflow-x: auto; border-radius: 12px; }
        code { font-family: monospace; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="menu-btn" id="menuBtn">☰</div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>🧠 Visione</h2>
            <button class="close-sidebar" id="closeSidebar">✕</button>
        </div>
        <button id="newChatBtnSidebar" class="btn-glass">✨ Nuova Chat</button>
        <div class="chat-list-container" id="chatList"></div>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="main-chat">
        <div class="chat-messages" id="chatMessages">
            <div class="message-wrapper ai-wrapper">
                <div class="message">Ciao! Sono Visione. Come posso aiutarti?</div>
            </div>
        </div>
        <div class="input-area">
            <div id="imagePreviewArea" style="display: flex; gap: 8px; flex-wrap: wrap;"></div>
            <div class="input-container">
                <button class="attach-btn" id="attachImageBtn">
                    <img src="attach.svg" alt="Allega" width="28" height="28">
                </button>
                <textarea id="userInput" rows="1" placeholder="Scrivi un messaggio..."></textarea>
                <button id="sendBtn">
                    <img src="send.svg" alt="Invia" width="28" height="28">
                </button>
            </div>
        </div>
    </div>
    <input type="file" id="imageInput" accept="image/*" style="display: none;">

    <script>
        // ========== CONFIGURAZIONE - MODIFICA QUI ==========
        const BACKEND_URL = 'https://web-production-69591.up.railway.app/'; // Sostituisci con il tuo backend
        const GROQ_API_KEY = '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';              // Sostituisci con la tua chiave Groq
        const GROQ_MODEL = 'llama-3.1-8b-instant';
        const GROQ_URL = 'https://api.groq.com/openai/v1/chat/completions';
        // ====================================================

        let allChats = {};
        let currentChatId = null;
        let currentImageBase64 = null;

        // Elementi DOM
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const attachBtn = document.getElementById('attachImageBtn');
        const imageInput = document.getElementById('imageInput');
        const imagePreviewArea = document.getElementById('imagePreviewArea');
        const menuBtn = document.getElementById('menuBtn');
        const sidebar = document.getElementById('sidebar');
        const closeSidebar = document.getElementById('closeSidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const newChatBtnSidebar = document.getElementById('newChatBtnSidebar');
        const chatListDiv = document.getElementById('chatList');

        function closeSidebarMenu() { sidebar.classList.remove('open'); overlay.classList.remove('active'); }
        function openSidebarMenu() { sidebar.classList.add('open'); overlay.classList.add('active'); }
        menuBtn.onclick = openSidebarMenu;
        closeSidebar.onclick = closeSidebarMenu;
        overlay.onclick = closeSidebarMenu;

        // Salvataggio localStorage
        function saveData() {
            localStorage.setItem('visione_mobile_chats', JSON.stringify(allChats));
            localStorage.setItem('visione_mobile_current', currentChatId);
        }
        function loadData() {
            const saved = localStorage.getItem('visione_mobile_chats');
            if (saved) allChats = JSON.parse(saved);
            currentChatId = localStorage.getItem('visione_mobile_current');
            if (currentChatId && !allChats[currentChatId]) currentChatId = null;
        }

        // Renderizza messaggio con Markdown e copia/download
        function renderMessage(content, role) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${role === 'user' ? 'user-wrapper' : 'ai-wrapper'}`;
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            let html = marked.parse(content);
            msgDiv.innerHTML = html;
            // Pulsante copia
            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.innerHTML = '📋';
            copyBtn.onclick = () => { navigator.clipboard.writeText(content); copyBtn.innerHTML = '✅'; setTimeout(() => copyBtn.innerHTML = '📋', 1500); };
            msgDiv.appendChild(copyBtn);
            // Se c'è codice, aggiungi pulsante download
            if (content.includes('```')) {
                const downloadBtn = document.createElement('button');
                downloadBtn.className = 'download-btn';
                downloadBtn.innerHTML = '💾';
                downloadBtn.onclick = () => { const blob = new Blob([content], {type: 'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'visione_output.txt'; a.click(); URL.revokeObjectURL(a.href); };
                msgDiv.appendChild(downloadBtn);
            }
            wrapper.appendChild(msgDiv);
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            msgDiv.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
        }

        function showTyping() {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper ai-wrapper';
            wrapper.id = 'typingIndicator';
            wrapper.innerHTML = `<div class="message typing-indicator"><span></span><span></span><span></span></div>`;
            chatMessages.appendChild(wrapper);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        function hideTyping() { document.getElementById('typingIndicator')?.remove(); }

        // Sidebar: lista chat
        function updateSidebarList() {
            chatListDiv.innerHTML = '';
            const sorted = Object.keys(allChats).sort((a,b)=>b-a);
            for (let id of sorted) {
                const item = document.createElement('div');
                item.className = 'chat-list-item';
                if (id === currentChatId) item.classList.add('active');
                item.onclick = () => loadChat(id);
                const titleSpan = document.createElement('span');
                titleSpan.innerText = allChats[id].title || 'Conversazione';
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-chat-btn';
                delBtn.innerHTML = '🗑';
                delBtn.onclick = (e) => { e.stopPropagation(); deleteChat(id); };
                item.appendChild(titleSpan);
                item.appendChild(delBtn);
                chatListDiv.appendChild(item);
            }
        }

        function loadChat(id) {
            if (!allChats[id]) return;
            currentChatId = id;
            saveData();
            updateSidebarList();
            chatMessages.innerHTML = '';
            for (let msg of allChats[id].history) {
                if (msg.role !== 'system') renderMessage(msg.content, msg.role);
            }
            closeSidebarMenu();
        }

        function deleteChat(id) {
            delete allChats[id];
            if (currentChatId === id) {
                currentChatId = null;
                chatMessages.innerHTML = '<div class="message-wrapper ai-wrapper"><div class="message">Nuova conversazione. Cosa vuoi chiedere?</div></div>';
            }
            saveData();
            updateSidebarList();
        }

        async function newChat() {
            currentChatId = Date.now().toString();
            allChats[currentChatId] = {
                title: 'Nuova chat',
                history: [{ role: 'system', content: 'Sei Visione, assistente intelligente.' }]
            };
            saveData();
            updateSidebarList();
            chatMessages.innerHTML = '<div class="message-wrapper ai-wrapper"><div class="message">Nuova conversazione. Cosa vuoi chiedere?</div></div>';
            closeSidebarMenu();
        }

        // RAG context dal backend
        async function getContext(question) {
            try {
                const res = await fetch(`${BACKEND_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: question })
                });
                const data = await res.json();
                if (data.response && !data.response.includes('Generazione automatica non disponibile')) return data.response;
                return '';
            } catch(e) { return ''; }
        }

        async function sendMessage() {
            let text = userInput.value.trim();
            if (!text && !currentImageBase64) return;
            if (!text && currentImageBase64) text = 'Descrivi questa immagine';
            if (!currentChatId) await newChat();

            // Mostra messaggio utente
            let userMsg = text;
            if (currentImageBase64) userMsg += `\n[Immagine in allegato]`;
            renderMessage(userMsg, 'user');
            allChats[currentChatId].history.push({ role: 'user', content: userMsg });
            saveData();
            userInput.value = '';
            userInput.style.height = 'auto';
            const imgToSend = currentImageBase64;
            currentImageBase64 = null;
            imagePreviewArea.innerHTML = '';

            showTyping();
            sendBtn.disabled = true;

            try {
                let context = await getContext(text);
                let imgDesc = '';
                if (imgToSend) {
                    try {
                        const imgRes = await fetch(`${BACKEND_URL}/analizza_immagine`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ image_base64: imgToSend })
                        });
                        const imgData = await imgRes.json();
                        imgDesc = imgData.description || '';
                    } catch(e) { imgDesc = 'Errore analisi immagine.'; }
                }
                // Costruisci prompt con cronologia recente
                const history = allChats[currentChatId].history.filter(m => m.role !== 'system').slice(-6);
                let prompt = `Sei Visione. Rispondi in italiano. ${history.map(m => `${m.role === 'user' ? 'Utente' : 'Assistente'}: ${m.content}`).join('\n')}\n\n`;
                if (context) prompt += `Informazioni: ${context}\n`;
                if (imgDesc) prompt += `Descrizione immagine: ${imgDesc}\n`;
                prompt += `\nUtente: ${text}\nRisposta:`;
                // Chiamata Groq
                const groqResp = await fetch(GROQ_URL, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: GROQ_MODEL, messages: [{ role: 'user', content: prompt }], temperature: 0.7, max_tokens: 600 })
                });
                if (!groqResp.ok) throw new Error(`Groq error ${groqResp.status}`);
                const groqData = await groqResp.json();
                const answer = groqData.choices[0].message.content;
                hideTyping();
                renderMessage(answer, 'assistant');
                allChats[currentChatId].history.push({ role: 'assistant', content: answer });
                saveData();
                // Genera titolo se primo messaggio
                if (allChats[currentChatId].history.filter(m => m.role !== 'system').length === 2) {
                    try {
                        const titleRes = await fetch(GROQ_URL, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${GROQ_API_KEY}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ model: GROQ_MODEL, messages: [{ role: 'user', content: `Genera un breve titolo (max 6 parole) per: ${text}` }], max_tokens: 30 })
                        });
                        const titleData = await titleRes.json();
                        let newTitle = titleData.choices[0].message.content.slice(0,40);
                        allChats[currentChatId].title = newTitle;
                        saveData();
                        updateSidebarList();
                    } catch(e) { console.warn("Titolo non generato"); }
                }
            } catch(err) {
                hideTyping();
                renderMessage(`❌ ${err.message}`, 'assistant');
                allChats[currentChatId].history.push({ role: 'assistant', content: `Errore: ${err.message}` });
                saveData();
            } finally {
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        // Auto-resize textarea
        function autoResize() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; }
        userInput.addEventListener('input', autoResize);
        sendBtn.onclick = sendMessage;
        userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
        attachBtn.onclick = () => imageInput.click();
        imageInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                currentImageBase64 = ev.target.result.split(',')[1];
                const previewDiv = document.createElement('div');
                previewDiv.className = 'image-preview';
                previewDiv.innerHTML = `<img src="${ev.target.result}"><span class="remove-img">✕</span>`;
                previewDiv.querySelector('.remove-img').onclick = () => { currentImageBase64 = null; previewDiv.remove(); };
                imagePreviewArea.appendChild(previewDiv);
            };
            reader.readAsDataURL(file);
        };
        newChatBtnSidebar.onclick = newChat;

        loadData();
        if (currentChatId && allChats[currentChatId]) loadChat(currentChatId);
        else newChat();
    </script>
</body>
</html>
