<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Visione AI - Developer Lab</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👨‍💻</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-color: #f5f5f7;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --sidebar-bg: rgba(240, 240, 245, 0.6);
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(0, 0, 0, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.05);
            --accent-color: #0071e3;
            --input-bg: rgba(255, 255, 255, 0.7);
            --hover-item: rgba(0, 0, 0, 0.04);
            --glow-1: rgba(0, 113, 227, 0.08);
            --glow-2: rgba(147, 51, 234, 0.05);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #060608;
                --text-main: #f5f5f7;
                --text-muted: #86868b;
                --sidebar-bg: rgba(20, 20, 25, 0.6);
                --glass-bg: rgba(255, 255, 255, 0.02);
                --glass-border: rgba(255, 255, 255, 0.08);
                --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
                --accent-color: #2997ff;
                --input-bg: rgba(30, 30, 35, 0.6);
                --hover-item: rgba(255, 255, 255, 0.05);
                --glow-1: rgba(41, 151, 255, 0.12);
                --glow-2: rgba(147, 51, 234, 0.1);
            }
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
        }
        .ambient-light {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            z-index: -1;
            pointer-events: none;
        }
        .light-1 { width: 50vw; height: 50vw; background: var(--glow-1); top: -10%; left: -10%; }
        .light-2 { width: 40vw; height: 40vw; background: var(--glow-2); bottom: -10%; right: -10%; }
        
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }
        #sidebar {
            width: 280px;
            height: 100%;
            border-right: 1px solid var(--glass-border);
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
            z-index: 10;
        }
        .brand h2 {
            font-size: 1.3rem;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-glass {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 12px 16px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 500;
            margin-bottom: 20px;
            text-decoration: none;
            width: 100%;
        }
        .btn-glass:hover {
            background: var(--hover-item);
            transform: translateY(-1px);
        }
        .main-lab {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }
        .toolbar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .toolbar button {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 8px 18px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-main);
        }
        .toolbar button:hover {
            background: var(--hover-item);
            transform: scale(0.97);
        }
        .editor-preview {
            display: flex;
            flex: 1;
            gap: 20px;
            min-height: 0;
        }
        .editor-container, .preview-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
        }
        .editor-header, .preview-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--glass-border);
            font-weight: 600;
            background: rgba(0,0,0,0.05);
        }
        textarea {
            flex: 1;
            background: var(--input-bg);
            border: none;
            padding: 16px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            color: var(--text-main);
            resize: none;
            outline: none;
        }
        .output-frame {
            flex: 1;
            width: 100%;
            border: none;
            background: white;
        }
        .explanation {
            margin-top: 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 16px;
            max-height: 200px;
            overflow-y: auto;
        }
        .explanation h3 { font-size: 1rem; margin-bottom: 8px; }
        .explanation p { font-size: 0.9rem; line-height: 1.4; }
        @media (max-width: 700px) {
            .editor-preview { flex-direction: column; }
            #sidebar { width: 240px; }
            .toolbar button { padding: 6px 12px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="ambient-light light-1"></div>
<div class="ambient-light light-2"></div>

<aside id="sidebar" class="glass-panel">
    <div class="brand"><h2>👨‍💻 Visione Lab</h2></div>
    <button id="newFileBtn" class="btn-glass">📄 Nuovo file</button>
    <button id="resetCodeBtn" class="btn-glass">🔄 Reset esempio</button>
    <a href="index.html" class="btn-glass" style="margin-top: auto;">← Torna alla chat</a>
</aside>

<div class="main-lab">
    <div class="toolbar">
        <button id="runBtn">▶️ Esegui codice</button>
        <button id="explainBtn">🧠 Spiega il codice</button>
        <button id="generateBtn">✨ Genera codice da descrizione</button>
        <button id="clearOutputBtn">🗑️ Pulisci output</button>
        <button id="copyBtn">📋 Copia codice</button>
    </div>
    <div class="editor-preview">
        <div class="editor-container">
            <div class="editor-header">📝 Editor (HTML/CSS/JS)</div>
            <textarea id="codeEditor" placeholder="Scrivi qui il tuo codice HTML, CSS o JavaScript..."></textarea>
        </div>
        <div class="preview-container">
            <div class="preview-header">🖥️ Anteprima / Output</div>
            <iframe id="previewFrame" class="output-frame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
        </div>
    </div>
    <div class="explanation" id="explanationBox">
        <h3>✨ Spiegazione AI</h3>
        <p>Clicca su "Spiega il codice" per ricevere un'analisi intelligente.</p>
    </div>
</div>

<script>
    // CONFIGURAZIONE - MODIFICA CON I TUOI DATI
    const GROQ_API_KEY = 'gsk_LA_TUA_NUOVA_CHIAVE';   // SOSTITUISCI
    const GROQ_MODEL = 'llama-3.1-8b-instant';
    const GROQ_URL = 'https://api.groq.com/openai/v1/chat/completions';
    
    // Elementi DOM
    const codeEditor = document.getElementById('codeEditor');
    const previewFrame = document.getElementById('previewFrame');
    const runBtn = document.getElementById('runBtn');
    const explainBtn = document.getElementById('explainBtn');
    const generateBtn = document.getElementById('generateBtn');
    const clearOutputBtn = document.getElementById('clearOutputBtn');
    const copyBtn = document.getElementById('copyBtn');
    const newFileBtn = document.getElementById('newFileBtn');
    const resetCodeBtn = document.getElementById('resetCodeBtn');
    const explanationDiv = document.getElementById('explanationBox');

    // Codice di esempio
    const DEFAULT_CODE = `<!DOCTYPE html>
<html>
<head>
    <title>Visione Demo</title>
    <style>
        body { font-family: system-ui; text-align: center; padding: 2rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        h1 { font-size: 2rem; }
        button { padding: 10px 20px; border: none; border-radius: 30px; background: white; color: #333; cursor: pointer; }
    </style>
</head>
<body>
    <h1>👋 Ciao da Visione AI</h1>
    <p>Questo codice è stato eseguito nel sandbox.</p>
    <button onclick="alert('Funziona!')">Cliccami</button>
</body>
</html>`;

    let currentCode = DEFAULT_CODE;
    codeEditor.value = currentCode;

    // Funzione per eseguire il codice nell'iframe (usa srcdoc per sicurezza)
    function runCode() {
        const code = codeEditor.value;
        currentCode = code;
        previewFrame.srcdoc = code;
    }

    // Pulisce l'iframe
    function clearOutput() {
        previewFrame.srcdoc = '<!DOCTYPE html><html><body style="background:white; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh;">🖥️ Output pulito</body></html>';
    }

    // Spiega il codice usando Groq
    async function explainCode() {
        const code = codeEditor.value;
        if (!code.trim()) {
            explanationDiv.innerHTML = `<h3>✨ Spiegazione AI</h3><p>⚠️ Nessun codice da spiegare.</p>`;
            return;
        }
        explanationDiv.innerHTML = `<h3>✨ Spiegazione AI</h3><p>🧠 Visione sta analizzando il codice...</p>`;
        const prompt = `Sei un esperto di programmazione. Spiega in modo chiaro e didattico (in italiano) il seguente codice, evidenziando cosa fa, le tecnologie utilizzate e eventuali best practice o miglioramenti. Codice:\n\n${code}`;
        try {
            const response = await fetch(GROQ_URL, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${GROQ_API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: GROQ_MODEL,
                    messages: [{ role: 'user', content: prompt }],
                    temperature: 0.5,
                    max_tokens: 800
                })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            const explanation = data.choices[0].message.content;
            let html = marked.parse(explanation);
            explanationDiv.innerHTML = `<h3>✨ Spiegazione AI</h3>${html}`;
        } catch (err) {
            explanationDiv.innerHTML = `<h3>✨ Spiegazione AI</h3><p>❌ Errore: ${err.message}</p>`;
            console.error(err);
        }
    }

    // Genera codice da descrizione (chiede input all'utente e restituisce codice HTML/CSS/JS)
    async function generateCodeFromDescription() {
        const description = prompt("Descrivi cosa vuoi che faccia il codice (es. 'un bottone che cambia colore quando cliccato'):");
        if (!description) return;
        explanationDiv.innerHTML = `<h3>✨ Generazione codice</h3><p>🔧 Visione sta generando il codice...</p>`;
        const promptMsg = `Genera codice HTML, CSS e JavaScript (tutto in un unico file HTML) che realizzi la seguente descrizione: "${description}". Restituisci SOLO il codice HTML, senza spiegazioni. Assicurati che sia funzionante e ben strutturato. Usa stili moderni.`;
        try {
            const response = await fetch(GROQ_URL, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${GROQ_API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: GROQ_MODEL,
                    messages: [{ role: 'user', content: promptMsg }],
                    temperature: 0.7,
                    max_tokens: 1500
                })
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            let generatedCode = data.choices[0].message.content;
            // Pulisci eventuali markdown: estrai codice tra ```html ... ```
            const codeMatch = generatedCode.match(/```(?:html)?\s*([\s\S]*?)```/);
            if (codeMatch) generatedCode = codeMatch[1];
            codeEditor.value = generatedCode;
            runCode();
            explanationDiv.innerHTML = `<h3>✨ Codice generato</h3><p>✅ Codice generato con successo! Premi "Esegui codice" per vederlo (già eseguito).</p>`;
        } catch (err) {
            explanationDiv.innerHTML = `<h3>✨ Errore</h3><p>❌ Impossibile generare codice: ${err.message}</p>`;
        }
    }

    // Copia codice
    function copyCode() {
        const code = codeEditor.value;
        navigator.clipboard.writeText(code).then(() => {
            const btn = copyBtn;
            const originalText = btn.innerText;
            btn.innerText = "✅ Copiato!";
            setTimeout(() => btn.innerText = originalText, 1500);
        }).catch(err => alert("Errore copia: " + err));
    }

    // Reset esempio
    function resetCode() {
        codeEditor.value = DEFAULT_CODE;
        runCode();
        explanationDiv.innerHTML = `<h3>✨ Reset</h3><p>Codice ripristinato all'esempio.</p>`;
    }

    // Nuovo file (vuoto)
    function newFile() {
        codeEditor.value = '';
        clearOutput();
        explanationDiv.innerHTML = `<h3>✨ Nuovo file</h3><p>Editor vuoto, scrivi il tuo codice.</p>`;
    }

    // Eventi
    runBtn.addEventListener('click', runCode);
    explainBtn.addEventListener('click', explainCode);
    generateBtn.addEventListener('click', generateCodeFromDescription);
    clearOutputBtn.addEventListener('click', clearOutput);
    copyBtn.addEventListener('click', copyCode);
    newFileBtn.addEventListener('click', newFile);
    resetCodeBtn.addEventListener('click', resetCode);

    // Salvataggio automatico su localStorage
    let saveTimeout;
    codeEditor.addEventListener('input', () => {
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            localStorage.setItem('visione_dev_code', codeEditor.value);
        }, 500);
    });
    // Carica eventuale codice salvato
    const savedCode = localStorage.getItem('visione_dev_code');
    if (savedCode) {
        codeEditor.value = savedCode;
        runCode();
    } else {
        runCode();
    }

    // Per rendere più bella l'area di spiegazione, evidenzia codice eventuale.
</script>
</body>
</html>
